name: Build and Release Potree Distribution

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch: # Allow manual triggering
    inputs:
      tag_name:
        description: 'Release tag name (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20] # Test multiple Node.js versions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for proper versioning

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if available)
        run: npm test --if-present

      - name: Build Potree
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build directory contents:"
          ls -la build/ || ls -la dist/ || ls -la public/
          echo "Total build size:"
          du -sh build/ || du -sh dist/ || du -sh public/

      # Only create release assets with Node.js 18 (avoid duplicates)
      - name: Create distribution tarball
        if: matrix.node-version == 18
        run: |
          # Determine the correct build output directory
          if [ -d "build" ]; then
            BUILD_DIR="build"
          elif [ -d "dist" ]; then
            BUILD_DIR="dist"
          elif [ -d "public" ]; then
            BUILD_DIR="public"
          else
            echo "Error: Could not find build output directory"
            exit 1
          fi

          echo "Creating tarball from $BUILD_DIR directory..."

          # Copy libs directory to build output
          echo "Copying libs directory to build output..."
          cp -r libs "$BUILD_DIR/"

          # Get version from tag or input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          # Create tarball with version in filename
          tar -czf "potree-dist-${VERSION}.tar.gz" -C "$BUILD_DIR" .

          # Also create a generic version for easier consumption
          cp "potree-dist-${VERSION}.tar.gz" "potree-dist.tar.gz"

          echo "Created distribution files:"
          ls -la *.tar.gz

          # Store build info for release notes
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate release notes
        if: matrix.node-version == 18
        run: |
          cat > release_notes.md << EOF
          # Potree Distribution Release ${{ env.VERSION }}

          ## 📦 Distribution Package

          This release contains the built Potree viewer ready for deployment.

          ### 🚀 Quick Start

          **Download and extract:**
          \`\`\`bash
          wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/potree-dist.tar.gz
          tar -xzf potree-dist.tar.gz -C /your/web/directory/
          \`\`\`

          **For CKAN integration:**
          \`\`\`dockerfile
          FROM node:18 AS potree-assets
          RUN wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/potree-dist.tar.gz
          RUN tar -xzf potree-dist.tar.gz

          FROM ckan/ckan-base:2.10
          COPY --from=potree-assets /potree/ /srv/app/src/ckanext-potree/ckanext/potree/public/potree/
          \`\`\`

          ### 📋 Build Information
          - **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Node.js Version:** 18.x
          - **Build Directory:** ${{ env.BUILD_DIR }}
          - **Commit:** ${{ github.sha }}

          ### 📁 Package Contents
          - Complete Potree viewer distribution
          - All required JavaScript libraries
          - CSS stylesheets and assets
          - Web workers and resources

          EOF

      - name: Create GitHub Release
        if: matrix.node-version == 18
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: 'Potree Distribution ${{ env.VERSION }}'
          body_path: release_notes.md
          files: |
            potree-dist-${{ env.VERSION }}.tar.gz
            potree-dist.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        if: matrix.node-version == 18
        uses: actions/upload-artifact@v4
        with:
          name: potree-distribution-${{ env.VERSION }}
          path: |
            potree-dist-*.tar.gz
            release_notes.md
          retention-days: 30

  # Notify on completion
  notify:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify success
        if: needs.build-and-release.result == 'success'
        run: |
          echo "✅ Potree distribution release completed successfully!"
          echo "📦 Release available at: https://github.com/${{ github.repository }}/releases/latest"

      - name: Notify failure
        if: needs.build-and-release.result == 'failure'
        run: |
          echo "❌ Potree distribution release failed!"
          echo "Please check the workflow logs for details."
